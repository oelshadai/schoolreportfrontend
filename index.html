<!doctype html>
<html lang="en" class="dark">
  <head>
    <!-- Cache refresh: 20250109-production-ready -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=5" />
    
    <!-- SEO and Meta -->
    <title>School Report SaaS - Elite Tech</title>
    <meta name="description" content="School Report SaaS by Elite Tech - Comprehensive school management system for teachers, students, and administrators. Manage classes, attendance, grades, and reports efficiently." />
    <meta name="keywords" content="school management, education, teachers, students, grades, attendance, reports, SaaS, Elite Tech" />
    <meta name="author" content="Elite Tech" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="School Report SaaS - Elite Tech" />
    <meta property="og:description" content="Comprehensive school management system for modern education" />
    <meta property="og:image" content="/EliteTech logo with 3D cube design.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="School Report SaaS - Elite Tech" />
    <meta name="twitter:description" content="Comprehensive school management system for modern education" />
    <meta name="twitter:image" content="/EliteTech logo with 3D cube design.png" />
    
    <!-- PWA Meta -->
    <meta name="theme-color" content="#f97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Elite Tech" />
    <meta name="application-name" content="Elite Tech" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/EliteTech logo with 3D cube design.png" />
    <link rel="shortcut icon" type="image/png" href="/EliteTech logo with 3D cube design.png" />
    <link rel="apple-touch-icon" href="/EliteTech logo with 3D cube design.png" />
    
    <!-- Preconnect to API domain -->
    <link rel="preconnect" href="https://school-report-saas.onrender.com" />
    <link rel="dns-prefetch" href="https://school-report-saas.onrender.com" />
    
    <!-- Critical CSS to prevent FOUC -->
    <style>
      html, body, #root {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        background-color: #0a0f1a;
      }

      /* ── Splash screen ── */
      .splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse at 30% 20%, rgba(249,115,22,0.08) 0%, transparent 50%),
          radial-gradient(ellipse at 70% 80%, rgba(251,191,36,0.06) 0%, transparent 50%),
          linear-gradient(160deg, #0d1117 0%, #111827 50%, #0a0f1a 100%);
        transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1), visibility 0.6s ease;
      }
      .splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Decorative corner accents */
      .splash-screen::before,
      .splash-screen::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }
      .splash-screen::before {
        width: 600px; height: 600px;
        top: -200px; left: -200px;
        background: radial-gradient(circle, rgba(249,115,22,0.04) 0%, transparent 65%);
      }
      .splash-screen::after {
        width: 500px; height: 500px;
        bottom: -180px; right: -180px;
        background: radial-gradient(circle, rgba(251,191,36,0.05) 0%, transparent 65%);
      }

      /* Card wrapper */
      .splash-card {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 48px 56px 40px;
        border-radius: 24px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(249,115,22,0.15);
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.04),
          0 24px 64px rgba(0,0,0,0.5),
          0 0 80px rgba(249,115,22,0.06);
        backdrop-filter: blur(12px);
        animation: splash-card-in 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      @keyframes splash-card-in {
        from { opacity: 0; transform: scale(0.88) translateY(20px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }

      /* Logo container */
      .splash-logo-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 4px;
      }

      /* Animated glow ring behind logo */
      .splash-glow {
        position: absolute;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          rgba(249,115,22,0.0),
          rgba(249,115,22,0.5),
          rgba(251,191,36,0.35),
          rgba(249,115,22,0.0)
        );
        animation: splash-rotate 2s linear infinite;
        filter: blur(8px);
      }
      @keyframes splash-rotate {
        to { transform: rotate(360deg); }
      }

      /* Pulsing outer halo */
      .splash-halo {
        position: absolute;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(249,115,22,0.12) 0%, transparent 70%);
        animation: splash-pulse 2.4s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 1; }
      }

      /* Logo image */
      .splash-logo {
        position: relative;
        z-index: 2;
        width: 100px;
        height: 100px;
        object-fit: contain;
        animation: splash-fade-in 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
        filter: drop-shadow(0 0 24px rgba(249,115,22,0.45));
      }
      @keyframes splash-fade-in {
        from { opacity: 0; transform: scale(0.65); }
        to   { opacity: 1; transform: scale(1); }
      }

      /* App name text */
      .splash-text {
        margin-top: 28px;
        color: #ffffff;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.3px;
        text-align: center;
        opacity: 0;
        animation: splash-text-in 0.6s ease-out 0.45s forwards;
      }
      @keyframes splash-text-in {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Subtle tagline */
      .splash-sub {
        margin-top: 8px;
        color: #f97316;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 3px;
        text-transform: uppercase;
        text-align: center;
        opacity: 0;
        animation: splash-text-in 0.6s ease-out 0.65s forwards;
      }

      /* Divider */
      .splash-divider {
        width: 40px;
        height: 2px;
        border-radius: 99px;
        background: linear-gradient(90deg, transparent, rgba(249,115,22,0.6), transparent);
        margin: 20px auto 0;
        opacity: 0;
        animation: splash-text-in 0.5s ease-out 0.85s forwards;
      }

      /* Progress bar loader */
      .splash-progress-wrap {
        width: 180px;
        height: 3px;
        border-radius: 99px;
        background: rgba(255,255,255,0.06);
        margin-top: 28px;
        overflow: hidden;
        opacity: 0;
        animation: splash-text-in 0.5s ease-out 1s forwards;
      }
      .splash-progress-bar {
        height: 100%;
        width: 40%;
        border-radius: 99px;
        background: linear-gradient(90deg, #f97316, #fbbf24);
        animation: splash-progress 1.6s ease-in-out infinite;
        box-shadow: 0 0 10px rgba(249,115,22,0.6);
      }
      @keyframes splash-progress {
        0%   { transform: translateX(-120%); }
        100% { transform: translateX(350%); }
      }

      /* Powered-by footer */
      .splash-powered {
        margin-top: 24px;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: rgba(148,163,184,0.5);
        text-align: center;
        opacity: 0;
        animation: splash-text-in 0.5s ease-out 1.1s forwards;
      }
      .splash-powered span {
        color: rgba(249,115,22,0.7);
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .splash-glow, .splash-halo, .splash-logo, .splash-card,
        .splash-text, .splash-sub, .splash-divider,
        .splash-progress-bar, .splash-powered {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Splash screen shown until React app mounts -->
      <div class="splash-screen" id="splash">
        <div class="splash-card">
          <div class="splash-logo-wrap">
            <div class="splash-halo"></div>
            <div class="splash-glow"></div>
            <img
              src="/EliteTech logo with 3D cube design.png"
              alt="Loading"
              class="splash-logo"
            />
          </div>
          <div class="splash-text">GES School Management System</div>
          <div class="splash-sub">Elite Tech</div>
          <div class="splash-divider"></div>
          <div class="splash-progress-wrap">
            <div class="splash-progress-bar"></div>
          </div>
          <div class="splash-powered">Powered by <span>Elite Tech Solutions</span></div>
        </div>
      </div>
    </div>
    
    <!-- Main app script -->
    <script type="module" src="/src/main.tsx"></script>
    

  </body>
</html>
